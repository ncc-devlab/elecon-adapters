name: adapter-ci

# 公开 adapters 仓的静态闸门。
# 这里不签名：bundle/digest 复核、签名和 catalog 发布属于发布流程。

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (vendored 校验器依赖)
        run: npm install

      - name: Public adapter checks（manifest / fixture / PII）
        run: npm run check
